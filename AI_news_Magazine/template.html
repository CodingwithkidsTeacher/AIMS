<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Magazine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>📰 AI News Magazine</h1>
        <p>Created by AI Agents 🤖</p>
        <p class="date"></p>
    </header>

    <main>
        {{ARTICLES}}
    </main>

    <footer>
        <p>Generated by AI • News from NewsAPI • Summaries by OpenAI</p>
    </footer>

    <script>
        // Display today's date
        const dateElement = document.querySelector('.date');
        if (dateElement) {
            const today = new Date();
            const formattedDate = today.toLocaleDateString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
            dateElement.textContent = formattedDate;
        }
    </script>
</body>
</html>
