<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Superhero Card</title>
 <!-- Link to external CSS -->
 <link rel="stylesheet" href="styles.css">
</head>
<body>


 <div class="card">


   <!-- Badge -->
   <div class="badge">⚡ OFFICIAL SUPERHERO CARD ⚡</div>


   <!-- Hero Image -->
   <img class="hero-image"
        src="https://placehold.co/200x200/333/white?text=HERO"
        alt="Superhero Portrait">


   <!-- Hero Name -->
   <div class="hero-name">THE CRUNCHY TACO</div>


   <!-- Catchphrase -->
   <div class="catchphrase">"FEAR THE CRUNCH!"</div>


   <!-- Power Stats -->
   <div class="stats">
     <span class="stat">⚡ 5G TORTILLA</span>
     <span class="stat">💔 SALSA</span>
   </div>


   <!-- AI Badge -->
   <div class="ai-badge">🤖 AI GENERATED HERO</div>


 </div>


 <!-- Optional JavaScript file -->
 <script src="script.js"></script>
</body>
</html>
