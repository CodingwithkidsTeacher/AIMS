<!DOCTYPE html>
<html>
<head>
   <title>Movie Trailer</title>
   <style>
       body {
           background: black;
           color: white;
           text-align: center;
           font-family: 'Impact', 'Arial Black', sans-serif;
           margin: 0;
           padding: 20px;
       }
       .movie-container {
           max-width: 800px;
           margin: 0 auto;
           background: #111;
           padding: 30px;
           border-radius: 20px;
           border: 2px solid gold;
           box-shadow: 0 0 30px rgba(255,215,0,0.3);
       }
       .movie-title {
           font-size: 48px;
           color: gold;
           text-shadow: 4px 4px 0px darkred;
           margin: 10px 0;
           letter-spacing: 3px;
       }
       .tagline {
           font-size: 24px;
           font-style: italic;
           color: #ccc;
           margin: 5px 0 20px 0;
           text-transform: uppercase;
       }
       .poster {
           width: 100%;
           max-width: 500px;
           border: 5px solid white;
           border-radius: 15px;
           box-shadow: 0 0 30px gold;
           margin: 20px auto;
           display: block;
       }
       .trailer-box {
           margin: 30px 0;
       }
       .trailer-box iframe, .trailer-box video {
           width: 100%;
           max-width: 560px;
           height: 315px;
           border: 3px solid gold;
           border-radius: 10px;
       }
       .voiceover {
           background: #222;
           padding: 15px;
           border-radius: 10px;
           font-family: 'Courier New', monospace;
           font-size: 18px;
           border-left: 5px solid gold;
           margin: 20px 0;
       }
       .nav-links {
           margin-top: 30px;
           display: flex;
           justify-content: center;
           gap: 30px;
       }
       .nav-links a {
           color: gold;
           text-decoration: none;
           font-size: 20px;
           padding: 10px 20px;
           border: 2px solid gold;
           border-radius: 50px;
           transition: all 0.3s;
       }
       .nav-links a:hover {
           background: gold;
           color: black;
           box-shadow: 0 0 20px gold;
       }
       .ai-badge {
           margin-top: 20px;
           color: #888;
           font-size: 12px;
       }
   </style>
</head>
<body>
<div class="movie-container">
   <!-- 1. SWAP THE MOVIE TITLE -->
   <div class="movie-title">THE CRUNCHY TACO: SHELL OF DESTINY</div>
  
   <!-- 2. SWAP THE TAGLINE -->
   <div class="tagline">"This Summer... Justice Gets Crunchy."</div>
  
   <!-- 3. SWAP THE POSTER IMAGE URL -->
   <img class="poster" src="https://placehold.co/500x700/222/gold?text=MOVIE+POSTER" alt="Movie Poster">
  
   <!-- 4. SWAP THE VOICEOVER LINE -->
   <div class="voiceover">
       🎙️ "In a world where WiFi is slow... one taco will rise... and bring the 5G."
   </div>
   <!-- 5. EMBED THE TRAILER VIDEO -->
   <div class="trailer-box">
       <h3>▶️ WATCH THE TRAILER ▶️</h3>
       <!-- Option A: YouTube Embed (replace src with your video link) -->
       <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"
               title="Movie Trailer"
               frameborder="0"
               allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
               allowfullscreen>
       </iframe>
      
       <!-- Option B: Video File (use this if you have an MP4 file) -->
       <!-- <video controls src="my-trailer.mp4" poster="poster.jpg"></video> -->
   </div>
   <!-- 6. NAVIGATION LINKS -->
   <div class="nav-links">
       <a href="superhero.html">← BACK TO ID CARD</a>
       <a href="comic.html">NEXT: COMIC STORY →</a>
   </div>
     <div class="ai-badge">
       🤖 AI GENERATED TRAILER // COMING SOON TO A BROWSER NEAR YOU
   </div>
</div>
</body>
</html>
